image: node:22

pages:
  stage: deploy
  only:
    - main
  before_script:
    - eval $(ssh-agent -s)
    - chmod 600 "$SYNC_SSH_KEY" && ssh-add "$SYNC_SSH_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -p 8781 git.skyrisai.com >> ~/.ssh/known_hosts 2>/dev/null
    - 'which git || (apt-get update -qq && apt-get install -y -qq git)'
  script:
    - npm ci
    - npm run build:with-sync
    - mv dist public
  artifacts:
    paths:
      - public
  tags:
    - docker
